<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Chakra Petch|Audiowide">
</head>
<body>
    <h1>Calculator</h1>
    <form name="calculatorForm" id="calculator">
        <input type="textfield" name="operation" value="" autocomplete="off" readonly><br>
        <input type="button" value="=" onclick="calculate()" class="calculate"><br>
        <input type="textfield" id="display" value="" autocomplete="off" readonly>
        <br>
        <input type="button" value="Ans" onclick="answer()" class="others">
        <input type="button" value="(" onclick="document.calculatorForm.operation.value += '('" class="others">
        <input type="button" value=")" onclick="document.calculatorForm.operation.value += ')'" class="others">
        <input type="button" value="Del" onclick="deleteLastChar()" class="others">
        <br>
        <input type="button" value="7" onclick="document.calculatorForm.operation.value += '7'" class="number">
        <input type="button" value="8" onclick="document.calculatorForm.operation.value += '8'" class="number">
        <input type="button" value="9" onclick="document.calculatorForm.operation.value += '9'" class="number">
        <input type="button" value="+" onclick="document.calculatorForm.operation.value += '+'" class="operator">
        <br>
        <input type="button" value="4" onclick="document.calculatorForm.operation.value += '4'" class="number">
        <input type="button" value="5" onclick="document.calculatorForm.operation.value += '5'" class="number">
        <input type="button" value="6" onclick="document.calculatorForm.operation.value += '6'" class="number">
        <input type="button" value="-" onclick="document.calculatorForm.operation.value += '-'" class="operator">
        <br>
        <input type="button" value="1" onclick="document.calculatorForm.operation.value += '1'" class="number">
        <input type="button" value="2" onclick="document.calculatorForm.operation.value += '2'" class="number">
        <input type="button" value="3" onclick="document.calculatorForm.operation.value += '3'" class="number">
        <input type="button" value="*" onclick="document.calculatorForm.operation.value += '*'" class="operator">
        <br>
        <input type="button" value="0" onclick="document.calculatorForm.operation.value += '0'" class="number">
        <input type="button" value="." onclick="document.calculatorForm.operation.value += '.'" class="others">
        <input type="reset" value="C" class="others">
        <input type="button" value="/" onclick="document.calculatorForm.operation.value += '/'" class="operator">
    </form>

<script src="script.js"></script>
</body>
</html>
